<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>COMPLEXITY AI BY DEAN</title>

<style>

/* GLOBAL */
body{
margin:0;
font-family:system-ui,Arial;
background:#343541;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#202123;
display:flex;
flex-direction:column;
padding:10px;
}

.logo{
font-size:18px;
font-weight:bold;
padding:15px;
}

.newchat{
background:#343541;
border:1px solid #565869;
color:white;
padding:10px;
border-radius:6px;
cursor:pointer;
margin-bottom:10px;
}

.newchat:hover{
background:#40414f;
}

.history{
flex:1;
overflow:auto;
}

.history div{
padding:8px;
cursor:pointer;
border-radius:6px;
}

.history div:hover{
background:#343541;
}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
}

.chat{
flex:1;
overflow:auto;
padding:20px;
}

/* MESSAGE */
.message{
max-width:700px;
margin:10px auto;
padding:15px;
border-radius:8px;
opacity:0;
animation:fadein 0.3s forwards;
}

@keyframes fadein{
to{opacity:1;}
}

.user{
background:#40414f;
}

.bot{
background:#444654;
}

/* CURSOR */
.cursor{
display:inline-block;
width:8px;
background:white;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0;}
}

/* INPUT */
.inputarea{
display:flex;
padding:15px;
background:#40414f;
}

input{
flex:1;
padding:12px;
background:#565869;
border:none;
color:white;
border-radius:6px;
}

button{
margin-left:10px;
padding:12px 20px;
background:#19c37d;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#15a46a;
}

</style>
</head>
<body>

<div class="sidebar">

<div class="logo">COMPLEXITY AI BY DEAN</div>

<button class="newchat" onclick="newChat()">+ New Chat</button>

<div class="history" id="history"></div>

</div>

<div class="main">

<div class="chat" id="chat"></div>

<div class="inputarea">

<input id="input" placeholder="Message Complexity AI..." onkeypress="if(event.key==='Enter') send()">

<button onclick="send()">Send</button>

</div>

</div>

<script>

/* RESPONSES */
const responses={

"hello":"Hello! Nice to talk to you.",
"hi":"Hi there! How can I help?",
"how are you":"I'm doing great.",
"who made you":"I was created by Dean.",
"what is your name":"I'm Complexity AI.",
"what is ai":"AI means artificial intelligence.",
"tell me a joke":"Why do programmers hate bugs? Because they take too long to debug."

};

/* fill 250 */
for(let i=0;i<240;i++){
responses["question "+i]="That's interesting. Tell me more.";
}

/* STORAGE */
let chats=JSON.parse(localStorage.getItem("complexity_chats")||"[]");

let currentChat=[];

/* SAVE */
function saveChats(){

if(currentChat.length>0){

chats.push(currentChat);

localStorage.setItem("complexity_chats",JSON.stringify(chats));

updateHistory();

}

}

/* HISTORY */
function updateHistory(){

let h=document.getElementById("history");

h.innerHTML="";

chats.forEach((chat,i)=>{

let div=document.createElement("div");

div.innerText="Chat "+(i+1);

div.onclick=()=>loadChat(i);

h.appendChild(div);

});

}

/* LOAD CHAT */
function loadChat(i){

document.getElementById("chat").innerHTML="";

currentChat=chats[i];

currentChat.forEach(m=>{

add(m.text,m.type,false);

});

}

/* NEW CHAT */
function newChat(){

saveChats();

currentChat=[];

document.getElementById("chat").innerHTML="";

}

/* SEND */
function send(){

let input=document.getElementById("input");

let text=input.value.trim().toLowerCase();

if(!text)return;

add(text,"user",true);

input.value="";

typing(text);

}

/* ADD MESSAGE */
function add(text,type,save){

let chat=document.getElementById("chat");

let div=document.createElement("div");

div.className="message "+type;

div.innerHTML=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

if(save){

currentChat.push({text,type});

}

}

/* TYPING */
function typing(userText){

let chat=document.getElementById("chat");

let div=document.createElement("div");

div.className="message bot";

chat.appendChild(div);

let reply=responses[userText]||"I understand. Tell me more.";

let i=0;

function type(){

div.innerHTML=reply.substring(0,i)+'<span class="cursor"></span>';

if(i<reply.length){

i++;

setTimeout(type,15);

}else{

div.innerHTML=reply;

currentChat.push({text:reply,type:"bot"});

}

}

setTimeout(type,500);

}

/* INIT */
updateHistory();

add("Hello. I am Complexity AI by Dean. How can I help?","bot",false);

</script>

</body>
</html>
