<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Complexity AI by Dean Baksh</title>

<style>

/* THEMES */

body.dark{
--bg:#343541;
--panel:#202123;
--bot:#444654;
--user:#10a37f;
--text:white;
}

body.light{
--bg:#ffffff;
--panel:#f0f0f0;
--bot:#e5e5e5;
--user:#007aff;
--text:black;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:Arial;
display:flex;
height:100vh;
}

/* SIDEBAR */

#sidebar{
width:260px;
background:var(--panel);
padding:10px;
overflow:auto;
}

.chatItem{
background:var(--bot);
padding:10px;
margin:5px 0;
cursor:pointer;
border-radius:6px;
}

/* MAIN */

#main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

#header{
padding:15px;
background:var(--panel);
display:flex;
align-items:center;
gap:10px;
}

#logo{
width:40px;
}

/* CHAT */

#chat{
flex:1;
overflow:auto;
padding:15px;
}

.message{
padding:10px;
margin:8px;
border-radius:8px;
max-width:70%;
}

.user{
background:var(--user);
margin-left:auto;
}

.bot{
background:var(--bot);
}

/* INPUT */

#inputArea{
display:flex;
padding:10px;
background:var(--panel);
}

#input{
flex:1;
padding:10px;
}

/* BUTTON */

button{
padding:10px;
margin:3px;
border:none;
background:var(--user);
color:white;
cursor:pointer;
border-radius:6px;
}

/* THINKING DOTS */

.typing{
padding:10px;
background:var(--bot);
border-radius:8px;
width:60px;
}

.dot{
display:inline-block;
width:6px;
height:6px;
margin:3px;
background:white;
border-radius:50%;
animation:blink 1.4s infinite;
}

.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}

@keyframes blink{
0%{opacity:0.2;}
20%{opacity:1;}
100%{opacity:0.2;}
}

/* LOGIN */

#login{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

</style>
</head>
<body class="dark">

<div id="login">

<h2>Login to Complexity AI</h2>

<input id="username" placeholder="Username">
<button onclick="login()">Login</button>

</div>

<div id="sidebar">

<button onclick="newChat()">+ New Chat</button>
<button onclick="exportChat()">Export</button>
<button onclick="deleteChat()">Delete</button>

<button onclick="setTheme('dark')">Dark</button>
<button onclick="setTheme('light')">Light</button>

<h3>Chats</h3>
<div id="history"></div>

</div>

<div id="main">

<div id="header">

<img id="logo" src="YOUR_LOGO_BASE64_HERE">

<b>Complexity AI by Dean Baksh</b>

</div>

<div id="chat"></div>

<div id="inputArea">

<input id="input" placeholder="Ask Complexity AI...">

<button onclick="send()">Send</button>

</div>

</div>

<script>

/* GET ELEMENTS */

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const historyDiv = document.getElementById("history");

/* LOGIN */

let user="";

function login(){

user=document.getElementById("username").value;

if(!user) return;

localStorage.setItem("user",user);

document.getElementById("login").style.display="none";

loadChats();

if(chats.length===0)newChat();

}

if(localStorage.getItem("user")){

user=localStorage.getItem("user");

document.getElementById("login").style.display="none";

loadChats();

}

/* THEME */

function setTheme(t){

document.body.className=t;

localStorage.setItem("theme",t);

}

let savedTheme=localStorage.getItem("theme");
if(savedTheme) document.body.className=savedTheme;

/* CHAT STORAGE */

let chats=[];
let currentChat=0;

function loadChats(){

chats=JSON.parse(localStorage.getItem("chats_"+user))||[];

renderChats();

}

function saveChats(){

localStorage.setItem("chats_"+user,JSON.stringify(chats));

}

function renderChats(){

historyDiv.innerHTML="";

chats.forEach((c,i)=>{

let div=document.createElement("div");

div.className="chatItem";

div.innerText="Chat "+(i+1);

div.onclick=()=>loadChat(i);

historyDiv.appendChild(div);

});

}

function loadChat(i){

currentChat=i;

chat.innerHTML="";

chats[i].forEach(m=>addMessage(m.text,m.type,false));

}

function newChat(){

chats.push([]);

currentChat=chats.length-1;

saveChats();

renderChats();

chat.innerHTML="";

}

function deleteChat(){

if(chats.length===0)return;

chats.splice(currentChat,1);

currentChat=0;

saveChats();

renderChats();

chat.innerHTML="";

}

function exportChat(){

let text=chats[currentChat]
.map(m=>m.type+": "+m.text)
.join("\n");

let blob=new Blob([text]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="chat.txt";

a.click();

}

/* QUESTIONS */

const qa={

"hello":"Hello. I am Complexity AI by Dean Baksh. How can I assist you?",

"what is google":"Google is a global technology company specialising in search, AI, and cloud computing.",

"who made you":"I was created by Dean Baksh.",

"what is ai":"Artificial intelligence is software that simulates intelligent thinking."

};

/* MESSAGE */

function addMessage(text,type,save=true){

let div=document.createElement("div");

div.className="message "+type;

div.innerText=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

if(save){

chats[currentChat].push({text,type});

saveChats();

}

return div;

}

/* THINKING DOTS */

function showThinking(){

let div=document.createElement("div");

div.className="typing";

div.innerHTML="<span class='dot'></span><span class='dot'></span><span class='dot'></span>";

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

return div;

}

/* TYPING */

function typeText(el,text){

let i=0;

let int=setInterval(()=>{

el.innerText+=text[i];

i++;

if(i>=text.length)clearInterval(int);

},15);

}

/* SEND */

function send(){

let text=input.value.trim();

if(!text)return;

if(chats.length===0)newChat();

addMessage(text,"user");

input.value="";

let thinking=showThinking();

setTimeout(()=>{

thinking.remove();

let reply=qa[text.toLowerCase()]||

"I understand your message. I will continue improving my responses.";

let bot=addMessage("","bot");

typeText(bot,reply);

},600);

}

/* ENTER KEY */

input.addEventListener("keypress",e=>{

if(e.key==="Enter")send();

});

</script>

</body>
</html>
