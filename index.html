<!DOCTYPE html>
<html>
<head>
<title>Offline AI Chatbot</title>
<style>
body {
    font-family: Arial;
    background-color: #f0f0f0;
}
#chatbox {
    width: 500px;
    margin: 50px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}
input {
    width: 80%;
    padding: 10px;
}
button {
    padding: 10px;
}
</style>
</head>
<body>

<div id="chatbox">
<h2>Offline AI Chatbot</h2>
<div id="chat"></div>

<input id="input" type="text" placeholder="Ask something...">
<button onclick="talk()">Send</button>
</div>

<script>
let responses = {
"hello": "Hello!",
"hi": "Hi there!",
"what is ai": "AI stands for Artificial Intelligence.",
"what is python": "Python is a programming language.",
"bye": "Goodbye!"
};

function talk() {
    let input = document.getElementById("input").value.toLowerCase();
    let chat = document.getElementById("chat");

    chat.innerHTML += "<p><b>You:</b> " + input + "</p>";

    if (responses[input]) {
        chat.innerHTML += "<p><b>Bot:</b> " + responses[input] + "</p>";
    } else {
        chat.innerHTML += "<p><b>Bot:</b> I don't understand yet.</p>";
    }

    document.getElementById("input").value = "";
}
</script>

</body>
</html>
