document.body.classList.toggle("light");

/* CHAT UI */

function renderChats(){

history.innerHTML="";

chats.forEach((c,i)=>{

let div=document.createElement("div");

div.className="chatItem";

div.innerText="Chat "+(i+1);

div.onclick=()=>loadChat(i);

history.appendChild(div);

});

}

function loadChat(i){

currentChat=i;

chat.innerHTML="";

chats[i].forEach(m=>addMessage(m.text,m.type,false));

}

function newChat(){

let c=[];

chats.push(c);

currentChat=chats.length-1;

saveChats();

renderChats();

chat.innerHTML="";

}

function deleteChat(){

if(currentChat==null)return;

chats.splice(currentChat,1);

saveChats();

renderChats();

chat.innerHTML="";

}

function exportChat(){

if(currentChat==null)return;

let text=chats[currentChat].map(m=>m.type+": "+m.text).join("\n");

let blob=new Blob([text]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="chat.txt";

a.click();

}

/* MESSAGE */

function addMessage(text,type,save=true){

let div=document.createElement("div");

div.className="message "+type;

div.innerText=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

if(save){

chats[currentChat].push({text,type});

saveChats();

}

return div;

}

/* TYPE */

function typeText(el,text){

let i=0;

let int=setInterval(()=>{

el.innerText+=text[i];

i++;

if(i>=text.length) clearInterval(int);

},15);

}

/* SEND */

function send(){

let text=input.value.trim();

if(!text)return;

if(currentChat==null)newChat();

addMessage(text,"user");

input.value="";

/* thinking */

let typing=document.createElement("div");

typing.className="typing";

typing.innerHTML="<span class='dot'></span><span class='dot'></span><span class='dot'></span>";

chat.appendChild(typing);

let reply=qa[text.toLowerCase()]||

"Complexity AI understands your request and will respond professionally.";

/* response */

setTimeout(()=>{

typing.remove();

let bot=addMessage("","bot");

typeText(bot,reply);

},800);

}

/* INIT */

renderChats();
